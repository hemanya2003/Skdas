<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SK DAS AREA MAP</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
}

#map{
width:100%;
height:100%;
}

.leaflet-popup-content{
font-size:15px;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

<script>

//-------------------------------------
// MAP
//-------------------------------------

var map=L.map("map");

//-------------------------------------
// SATELLITE
//-------------------------------------

L.tileLayer(
"https://api.maptiler.com/maps/satellite/{z}/{x}/{y}.jpg?key=VTyVRu9eUsVOXeBj5TqJ",
{
maxZoom:22,
attribution:"© MapTiler © OpenStreetMap"
}).addTo(map);


//-------------------------------------
// LOAD KML
//-------------------------------------

var kml=omnivore.kml(
"https://raw.githubusercontent.com/hemanya2003/Skdas/main/SK_DAS_SIR_AREA_AREAS1.kml"
)
.on("ready",function(){

map.fitBounds(this.getBounds());

this.eachLayer(function(layer){

var desc="";

if(layer.feature.properties.description)
desc=layer.feature.properties.description;

if(layer.feature.properties.Description)
desc=layer.feature.properties.Description;


//-------------------------------------
// Extract AREA
//-------------------------------------

var area="Not Available";

var areaMatch=desc.match(/AREA<\/B>\s*=\s*([^<]+)/i);

if(areaMatch)
area=areaMatch[1].trim();


//-------------------------------------
// Extract Village
//-------------------------------------

var village="Not Available";

var villageMatch=desc.match(/Vill_Name<\/B>\s*=\s*([^<]+)/i);

if(villageMatch)
village=villageMatch[1].trim();


//-------------------------------------
// STYLE
//-------------------------------------

layer.setStyle({

color:"#ff0000",
weight:3,
fill:false,
fillOpacity:0

});


//-------------------------------------
// POPUP
//-------------------------------------

layer.bindPopup(

`
<div style="width:260px;font-family:Arial">

<h2 style="margin:0;color:#1565C0;">
Area Information
</h2>

<hr>

<table style="width:100%;font-size:15px">

<tr>
<td><b>Village</b></td>
<td>${village}</td>
</tr>

<tr>
<td><b>Area</b></td>
<td>${area} Ha</td>
</tr>

</table>

</div>

`

);

});

})

.addTo(map);

</script>

</body>
</html>
