<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SK DAS Area Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.leaflet-popup-content{
    font-size:15px;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

<script>

//---------------------------
// Create Map
//---------------------------

var map = L.map('map');


//---------------------------
// MapTiler Satellite
//---------------------------

L.tileLayer(
'https://api.maptiler.com/maps/satellite/{z}/{x}/{y}.jpg?key=VTyVRu9eUsVOXeBj5TqJ',
{
    attribution:'© MapTiler © OpenStreetMap',
    maxZoom:22
}).addTo(map);


//---------------------------
// Load KML
//---------------------------

var kml = omnivore.kml(
'https://raw.githubusercontent.com/hemanya2003/Skdas/main/SK_DAS_SIR_AREA_AREAS1.kml'
)
.on('ready', function () {

    map.fitBounds(this.getBounds());

    this.eachLayer(function(layer){

        var p = layer.feature.properties;

        var village =
            p.Vill_Name ||
            p.Village ||
            p.Name ||
            p.name ||
            "";

        var area =
            p.AREA ||
            p.Area ||
            p.area ||
            "";

        // If values are inside Description
        if((village==="" || area==="") && p.description){

            var d = p.description;

            var villageMatch = d.match(/Vill.?_?Name.*?<td>(.*?)<\/td>/i);
            var areaMatch = d.match(/AREA.*?<td>(.*?)<\/td>/i);

            if(villageMatch) village = villageMatch[1];
            if(areaMatch) area = areaMatch[1];
        }

        layer.setStyle({
            color:"#ff0000",
            weight:2,
            fillColor:"#00ff00",
            fillOpacity:0.35
        });

        layer.bindPopup(
        "<h3>Area Information</h3>" +
        "<b>Village :</b> " + village +
        "<br><b>Area :</b> " + area
        );

    });

})
.addTo(map);

</script>

</body>
</html>
